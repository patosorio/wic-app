dev = [
"pytest>=8.2.0",
"pytest-asyncio>=0.23.0",
"httpx>=0.27.0",
"black>=24.4.0",
"ruff>=0.4.0",
"mypy>=1.10.0",
]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
select = ["E","F","I","UP","B","SIM"]

[tool.mypy]
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"